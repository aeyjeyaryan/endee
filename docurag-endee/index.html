<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DocuRAG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: monospace;
    background: #f5f5f5;
    color: #111;
    max-width: 700px;
    margin: 60px auto;
    padding: 0 20px;
  }

  h1 { font-size: 18px; margin-bottom: 32px; }
  h1 span { color: #999; font-weight: normal; }

  section { margin-bottom: 32px; }

  label { display: block; font-size: 12px; color: #999; margin-bottom: 6px; }

  input[type="file"] { font-size: 13px; }

  button {
    background: #111;
    color: #fff;
    border: none;
    padding: 8px 16px;
    font-family: monospace;
    font-size: 13px;
    cursor: pointer;
    margin-top: 8px;
  }

  button:hover { background: #333; }
  button:disabled { background: #ccc; cursor: not-allowed; }

  textarea {
    width: 100%;
    padding: 10px;
    font-family: monospace;
    font-size: 13px;
    border: 1px solid #ddd;
    resize: none;
    background: #fff;
    margin-bottom: 8px;
  }

  #answer {
    background: #fff;
    border: 1px solid #ddd;
    padding: 14px;
    font-size: 13px;
    line-height: 1.7;
    min-height: 80px;
    white-space: pre-wrap;
    color: #111;
  }

  #status { font-size: 12px; color: #999; margin-top: 6px; }
  .ok { color: #2a9d2a; }
  .err { color: #cc0000; }

  hr { border: none; border-top: 1px solid #e0e0e0; margin: 32px 0; }
</style>
</head>
<body>

<h1>DocuRAG <span>/ test</span></h1>

<!-- INGEST -->
<section>
  <label>INGEST DOCUMENT</label>
  <input type="file" id="fileInput" accept=".pdf,.txt,.md">
  <br>
  <button onclick="ingest()" id="btnIngest">Upload & Ingest</button>
  <div id="ingestStatus"></div>
</section>

<hr>

<!-- QUERY -->
<section>
  <label>ASK A QUESTION</label>
  <textarea id="question" rows="3" placeholder="What is this document about?"></textarea>
  <button onclick="query()" id="btnQuery">Ask</button>
  <div id="status"></div>
</section>

<hr>

<!-- ANSWER -->
<section>
  <label>ANSWER</label>
  <div id="answer">—</div>
</section>

<script>
  const API = 'http://localhost:8000';

  async function ingest() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return alert('Pick a file first');

    const btn = document.getElementById('btnIngest');
    btn.disabled = true;
    btn.textContent = 'Ingesting...';
    document.getElementById('ingestStatus').textContent = '';

    const form = new FormData();
    form.append('file', file);

    try {
      const r = await fetch(`${API}/api/v1/ingest`, { method: 'POST', body: form });
      const d = await r.json();
      if (r.ok) {
        document.getElementById('ingestStatus').textContent = `✓ ${d.chunks_indexed} chunks indexed from "${d.filename}"`;
        document.getElementById('ingestStatus').className = 'ok';
      } else {
        document.getElementById('ingestStatus').textContent = `✗ ${d.detail}`;
        document.getElementById('ingestStatus').className = 'err';
      }
    } catch {
      document.getElementById('ingestStatus').textContent = '✗ Could not reach API';
      document.getElementById('ingestStatus').className = 'err';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Upload & Ingest';
    }
  }

  async function query() {
    const q = document.getElementById('question').value.trim();
    if (!q) return;

    const btn = document.getElementById('btnQuery');
    btn.disabled = true;
    document.getElementById('status').textContent = 'searching...';
    document.getElementById('answer').textContent = '—';

    try {
      const r = await fetch(`${API}/api/v1/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, top_k: 5 })
      });
      const d = await r.json();
      if (r.ok) {
        document.getElementById('answer').textContent = d.answer;
        const sources = [...new Set(d.sources.map(s => s.source))].join(', ');
        document.getElementById('status').textContent = `sources: ${sources} · ${d.retrieval_ms}ms retrieval · ${d.generation_ms}ms generation`;
      } else {
        document.getElementById('answer').textContent = d.detail || 'Error';
        document.getElementById('status').textContent = '';
      }
    } catch {
      document.getElementById('answer').textContent = 'Could not reach API';
      document.getElementById('status').textContent = '';
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('question').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); query(); }
  });
</script>
</body>
</html>
